version: '3.8'

services:
  blog:
    build: .
    container_name: camelia-blog
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 挂载内容目录：更新文章无需重新构建镜像，只需 docker compose restart
      - ./backend/content:/app/content
    environment:
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/categories"]
      interval: 30s
      timeout: 5s
      retries: 3
